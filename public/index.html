<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doc Agent</title>
  </head>
  <body>
    <h1>Doc Agent</h1>
    <input id="query" type="text" placeholder="输入你的问题，例如：React useEffect 是什么？" />
    <button id="send">发送</button>
    <div id="answer"></div>

    <script>
      const queryInput = document.getElementById("query");
      const sendBtn = document.getElementById("send");
      const answerEl = document.getElementById("answer");

      sendBtn.addEventListener("click", async () => {
        const query = queryInput.value.trim();
        if (!query) {
          answerEl.textContent = "请输入问题";
          return;
        }

        answerEl.textContent = "正在思考...";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });

          const data = await response.json();
          if (!response.ok) {
            answerEl.textContent = data.error || "请求失败";
            return;
          }

          answerEl.textContent = data.answer;
        } catch (error) {
          answerEl.textContent = "请求异常，请检查服务是否已启动";
        }
      });
    </script>
  </body>
</html>
